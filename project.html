<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'none';">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>Project — Dipesh Patel</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="fonts/fonts.css">
<style>
:root {
  --white:#ffffff; --off:#f4f6f9; --off2:#edf0f5;
  --border:#d8dde8; --border2:#c4cad8;
  --text:#0d1117; --text2:#3d4a5c; --text3:#7a8a9e;
  --accent:#00b4d8; --accent2:#0077b6; --accent3:#023e8a;
  --success:#06d6a0; --warn:#f4a261;
  --shadow:0 2px 20px rgba(0,100,180,.08);
  --shadow-lg:0 8px 40px rgba(0,100,180,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'JetBrains Mono',monospace;background:var(--white);color:var(--text);overflow-x:hidden;}
@media(pointer:fine){body{cursor:none;}}

/* ── CURSOR ── */
@media(pointer:coarse){#cur,#curR{display:none;}}
#cur{width:10px;height:10px;background:var(--accent2);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;}
#cur.h{width:6px;height:6px;background:var(--accent);}
#curR{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,opacity .25s;}
#curR.h{width:56px;height:56px;border-color:var(--accent2);opacity:.45;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--off);}
::-webkit-scrollbar-thumb{background:var(--accent2);}
#prog{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));z-index:200;transition:width .08s;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:62px;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-logo {font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.25rem;text-decoration:none;display:flex;align-items:center;gap:0.6rem;}
.logo-main {color:#000; /* black */}
.logo-accent {color:var(--accent2); /* your blue */}  
.nav-logo-icon{width:28px;height:28px;border:2px solid var(--accent2);display:flex;align-items:center;justify-content:center;position:relative;}
.nav-logo-icon::before{content:'';width:8px;height:8px;background:var(--accent2);border-radius:50%;}
.nav-logo-icon::after{content:'';position:absolute;width:18px;height:18px;border:1.5px solid var(--accent);border-radius:50%;animation:ping 2s ease-in-out infinite;}
@keyframes ping{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(1.8)}}
.back-btn{display:flex;align-items:center;gap:.6rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);text-decoration:none;transition:color .2s;padding:.45rem 1rem;border:1px solid var(--border);background:var(--off);}
.back-btn:hover{color:var(--accent2);border-color:var(--accent2);}
.back-btn svg{transition:transform .2s;}
.back-btn:hover svg{transform:translateX(-3px);}
.nav-crumb{font-size:.65rem;letter-spacing:.1em;color:var(--text3);display:flex;align-items:center;gap:.5rem;}
.nav-crumb span{color:var(--accent2);}

/* ── HERO ── */
#proj-hero{padding:6rem 3rem 4rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;background:var(--white);}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,119,182,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,119,182,.03) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
.hero-glow-bg{position:absolute;top:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,180,216,.1) 0%,transparent 70%);pointer-events:none;}
.proj-hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.proj-back-crumb{display:flex;align-items:center;gap:.5rem;margin-bottom:2rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.proj-back-crumb a{color:var(--text3);text-decoration:none;transition:color .2s;}
.proj-back-crumb a:hover{color:var(--accent2);}
.proj-back-crumb .sep{color:var(--border2);}
.proj-back-crumb .current{color:var(--accent2);}

.proj-hero-layout{display:grid;grid-template-columns:1fr auto;gap:3rem;align-items:start;}
.proj-cat-tag{display:inline-flex;align-items:center;gap:.5rem;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);border:1px solid var(--accent);padding:.3rem .75rem;background:rgba(0,180,216,.05);margin-bottom:1.25rem;}
/* .proj-cat-tag::before{content:'';width:5px;height:5px;background:var(--accent);border-radius:50%;}*/
.proj-title{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,5vw,3.8rem);font-weight:700;line-height:.95;letter-spacing:-.02em;color:var(--text);margin-bottom:1.25rem;}
.proj-subtitle{font-size:.85rem;line-height:1.8;color:var(--text2);font-weight:300;max-width:680px;margin-bottom:2rem;}
.proj-meta-row{display:flex;flex-wrap:wrap;gap:2rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.proj-meta-item{display:flex;flex-direction:column;gap:.3rem;}
.proj-meta-label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);}
.proj-meta-val{font-size:.82rem;color:var(--text);font-weight:500;}
.proj-meta-val.green{color:var(--success);}
.proj-meta-val.blue{color:var(--accent2);}

.proj-hero-right{display:flex;flex-direction:column;gap:.75rem;align-items:flex-end;}
.proj-num-big{font-family:'Rajdhani',sans-serif;font-size:6rem;font-weight:700;line-height:1;color:var(--off2);letter-spacing:-.04em;user-select:none;}
.proj-status-badge{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid;}
.proj-status-badge.live{color:var(--success);border-color:rgba(6,214,160,.4);background:rgba(6,214,160,.06);}
.proj-status-badge.wip{color:var(--warn);border-color:rgba(244,162,97,.4);background:rgba(244,162,97,.06);}
.proj-links{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:flex-end;}
.proj-link-btn{padding:.5rem 1.1rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border:1px solid var(--border2);color:var(--text2);transition:all .25s;display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;}
.proj-link-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.proj-link-btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.proj-link-btn.primary:hover{background:var(--accent3);border-color:var(--accent3);}

/* ── TECH STACK BAR ── */
.tech-bar{background:var(--off2);border-bottom:1px solid var(--border);padding:1rem 3rem;}
.tech-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.tech-bar-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);flex-shrink:0;}
.tech-pills{display:flex;gap:.5rem;flex-wrap:wrap;}
.tech-pill{padding:.28rem .75rem;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--border);color:var(--text2);background:var(--white);transition:all .2s;}
.tech-pill:hover{border-color:var(--accent2);color:var(--accent2);}

/* ── BODY ── */
.proj-body{max-width:1200px;margin:0 auto;padding:4rem 3rem;}
.proj-body-grid{display:grid;grid-template-columns:1fr 340px;gap:4rem;align-items:start;}

/* Overview */
.section-label{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent2);border-left:2px solid var(--accent2);padding-left:.6rem;margin-bottom:1.25rem;}
.proj-overview p{font-size:.85rem;line-height:1.95;color:var(--text2);font-weight:300;margin-bottom:1.2rem;}
.proj-overview p:last-child{margin-bottom:0;}

/* Steps */
.steps-list{display:flex;flex-direction:column;gap:0;}
.step-item{border-top:1px solid var(--border);padding:2rem 0;}
.step-item:last-child{border-bottom:1px solid var(--border);}
.step-item-inner{display:grid;grid-template-columns:56px 1fr 360px;gap:2.5rem;align-items:start;}
.step-num{font-family:'Rajdhani',sans-serif;font-size:2.5rem;font-weight:700;color:var(--off2);line-height:1;padding-top:.2rem;user-select:none;transition:color .3s;}
.step-item:hover .step-num{color:var(--accent2);}
.step-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:.5rem;}
.step-desc{font-size:.78rem;line-height:1.85;color:var(--text2);font-weight:300;}
.step-code{margin-top:.85rem;background:var(--off);border:1px solid var(--border);border-left:3px solid var(--accent2);padding:.85rem 1rem;font-size:.7rem;color:var(--text);line-height:1.65;overflow-x:auto;white-space:pre;}
/* per-step screenshot */
.step-sc{border:1px solid var(--border);background:var(--off);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.step-sc.has-img{cursor:zoom-in;transition:border-color .2s,box-shadow .2s;}
.step-sc.has-img:hover{border-color:var(--accent2);box-shadow:0 4px 20px rgba(0,119,182,.15);}
.step-sc.has-img:hover img{opacity:.92;}
.step-sc img{width:100%;height:100%;object-fit:contain;display:block;background:var(--off);transition:opacity .2s;}
.step-sc-inner{display:flex;flex-direction:column;align-items:center;gap:.55rem;pointer-events:none;}
.step-sc-icon{width:34px;height:34px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);}
.step-sc-label{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
/* zoom hint badge */
.step-sc-zoom{position:absolute;bottom:.5rem;right:.5rem;background:rgba(0,119,182,.85);color:#fff;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;display:flex;align-items:center;gap:.3rem;opacity:0;transition:opacity .2s;pointer-events:none;}
.step-sc.has-img:hover .step-sc-zoom{opacity:1;}

/* ── LIGHTBOX ── */
#lightbox{
  position:fixed;inset:0;z-index:9000;
  background:rgba(5,10,20,.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
  backdrop-filter:blur(6px);
  padding:1.5rem;
}
#lightbox.open{opacity:1;pointer-events:all;}
#lightbox-img{
  max-width:92vw;max-height:88vh;
  object-fit:contain;display:block;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.94);
  transition:transform .28s cubic-bezier(.22,1,.36,1);
  border:1px solid rgba(255,255,255,.08);
}
#lightbox.open #lightbox-img{transform:scale(1);}
#lightbox-close{
  position:fixed;top:1.25rem;right:1.5rem;
  width:40px;height:40px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,border-color .2s;
  font-size:1rem;
}
#lightbox-close:hover{background:rgba(239,35,60,.7);border-color:rgba(239,35,60,.8);}
#lightbox-caption{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.5);white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
}
/* ════════════════════════════════════════════════════════
   RESPONSIVE LAYOUT — project.html
   1200px · 960px · 768px · 600px · 380px
════════════════════════════════════════════════════════ */

/* ── 1200px: tighten large screens ── */
@media(max-width:1200px){
  #proj-hero,.tech-bar,.proj-body,.proj-nav-bar,footer{padding-left:2rem;padding-right:2rem;}
  .proj-body-grid{gap:3rem;}
  .step-item-inner{gap:2rem;}
}

/* ── 1100px: step screenshot drops below text ── */
@media(max-width:1100px){
  .step-item-inner{grid-template-columns:44px 1fr;}
  .step-sc{grid-column:2;}
}

/* ── 960px: tablet landscape ── */
@media(max-width:960px){
  nav{padding:0 1.5rem;}
  #proj-hero,.tech-bar,.proj-body,.proj-nav-bar,footer{padding-left:1.5rem;padding-right:1.5rem;}
  #proj-hero{padding-top:5rem;padding-bottom:3rem;}
  .proj-hero-layout{grid-template-columns:1fr;}
  .proj-hero-right{
    align-items:flex-start;
    flex-direction:row;
    flex-wrap:wrap;
    gap:1rem;
    margin-top:1.5rem;
  }
  .proj-num-big{font-size:4rem;}
  .proj-body-grid{grid-template-columns:1fr;}
  .proj-sidebar{position:static;top:auto;}
  .proj-nav-inner{gap:1rem;}
  .proj-nav-name{font-size:.9rem;}
}

/* ── 768px: tablet portrait ── */
@media(max-width:768px){
  #proj-hero{padding-top:4.5rem;padding-bottom:2.5rem;}
  .proj-title{font-size:clamp(1.8rem,6vw,3rem);}
  .proj-subtitle{font-size:.8rem;}
  .proj-meta-row{gap:1.25rem;}
  .proj-num-big{font-size:3rem;}
  .tech-bar{padding-top:.75rem;padding-bottom:.75rem;}
  .proj-body{padding-top:3rem;padding-bottom:3rem;}
  .step-item{padding:1.75rem 0;}
  .step-title{font-size:1.1rem;}
  .step-desc{font-size:.75rem;}
  .proj-nav-bar{padding-top:1.25rem;padding-bottom:1.25rem;}
  .proj-nav-btn{padding:.6rem 1rem;gap:.75rem;}
}

/* ── 760px: step layout simplifies ── */
@media(max-width:760px){
  .step-item-inner{grid-template-columns:1fr;}
  .step-num{font-size:1.8rem;}
  .step-sc{grid-column:1;margin-top:1rem;}
}

/* ── 600px: large phone ── */
@media(max-width:600px){
  nav{padding:0 1rem;height:56px;}
  .nav-crumb{display:none;}
  #proj-hero,.tech-bar,.proj-body,.proj-nav-bar,footer{padding-left:1.25rem;padding-right:1.25rem;}
  #proj-hero{padding-top:4rem;padding-bottom:2rem;}
  .proj-back-crumb{font-size:.58rem;margin-bottom:1.25rem;}
  .proj-title{font-size:clamp(1.6rem,8vw,2.4rem);margin-bottom:1rem;}
  .proj-subtitle{font-size:.76rem;line-height:1.7;margin-bottom:1.5rem;}
  .proj-meta-row{gap:1rem;padding-top:1.25rem;}
  .proj-meta-label{font-size:.55rem;}
  .proj-meta-val{font-size:.75rem;}
  .proj-num-big{font-size:2.5rem;}
  .proj-hero-right{gap:.75rem;}
  .proj-links{justify-content:flex-start;}
  .proj-link-btn{font-size:.6rem;padding:.45rem .9rem;}
  .tech-bar{padding-top:.65rem;padding-bottom:.65rem;}
  .tech-bar-inner{gap:1rem;}
  .tech-pill{font-size:.6rem;padding:.22rem .6rem;}
  .proj-body{padding-top:2.5rem;padding-bottom:2.5rem;}
  .section-label{font-size:.56rem;margin-bottom:1rem;}
  .proj-overview p{font-size:.78rem;line-height:1.8;}
  .step-item{padding:1.5rem 0;}
  .step-num{font-size:1.5rem;}
  .step-title{font-size:1rem;}
  .step-desc{font-size:.73rem;}
  .step-code{font-size:.65rem;padding:.7rem .85rem;}
  .sidebar-panel-body{padding:1rem;}
  .outcome-list li{font-size:.7rem;}
  .related-name{font-size:.68rem;}
  .proj-nav-bar{padding-top:1rem;padding-bottom:1rem;}
  .proj-nav-inner{gap:.75rem;}
  .proj-nav-btn{padding:.5rem .85rem;gap:.6rem;}
  .proj-nav-arrow{width:30px;height:30px;}
  .proj-nav-name{font-size:.82rem;}
  .proj-nav-dir{font-size:.54rem;}
  footer{flex-direction:column;gap:1rem;text-align:center;padding:1.25rem 1rem;}
  .footer-r{justify-content:center;gap:1rem;flex-wrap:wrap;}
  .footer-r a{font-size:.58rem;}
}

/* ── 380px: small phone ── */
@media(max-width:380px){
  nav{height:52px;}
  #proj-hero{padding-top:3.5rem;}
  .proj-title{font-size:1.5rem;}
  .proj-subtitle{font-size:.73rem;}
  .proj-num-big{font-size:2rem;}
  .proj-body{padding-top:2rem;padding-bottom:2rem;}
  .step-title{font-size:.95rem;}
  .proj-nav-btn{padding:.45rem .7rem;}
  .proj-nav-name{font-size:.75rem;}
}

/* Sidebar */
.proj-sidebar{display:flex;flex-direction:column;gap:1.5rem;position:sticky;top:82px;}
.sidebar-panel{border:1px solid var(--border);overflow:hidden;}
.sidebar-panel-head{background:var(--off2);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;gap:.5rem;}
.sidebar-dot{width:8px;height:8px;border-radius:50%;}
.sidebar-panel-title{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-left:auto;}
.sidebar-panel-body{padding:1.25rem;}
.sidebar-stat{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.72rem;}
.sidebar-stat:last-child{border-bottom:none;}
.sidebar-stat-k{color:var(--text3);}
.sidebar-stat-v{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--text);}
.sidebar-stat-v.green{color:var(--success);}
.sidebar-stat-v.blue{color:var(--accent2);}

.outcome-list{list-style:none;display:flex;flex-direction:column;gap:.6rem;}
.outcome-list li{font-size:.74rem;line-height:1.6;color:var(--text2);padding-left:1.1rem;position:relative;}
.outcome-list li::before{content:'✓';position:absolute;left:0;color:var(--success);font-size:.7rem;font-weight:700;}

.related-list{display:flex;flex-direction:column;gap:0;}
.related-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border);text-decoration:none;transition:background .2s;cursor:pointer;}
.related-item:last-child{border-bottom:none;}
.related-item:hover .related-name{color:var(--accent2);}
.related-icon-wrap{width:30px;height:30px;border:1px solid var(--border);background:var(--off2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent2);}
.related-name{font-size:.72rem;color:var(--text);font-weight:500;line-height:1.3;}
.related-cat{font-size:.6rem;color:var(--text3);letter-spacing:.06em;margin-top:.1rem;}

/* Nav prev/next */
.proj-nav-bar{background:var(--off2);border-top:1px solid var(--border);padding:1.5rem 3rem;}
.proj-nav-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:2rem;}
.proj-nav-btn{display:flex;align-items:center;gap:1rem;text-decoration:none;transition:all .2s;padding:.75rem 1.25rem;border:1px solid var(--border);background:var(--white);}
.proj-nav-btn:hover{border-color:var(--accent2);}
.proj-nav-btn.next{flex-direction:row-reverse;}
.proj-nav-arrow{width:36px;height:36px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;transition:all .2s;}
.proj-nav-btn:hover .proj-nav-arrow{border-color:var(--accent2);color:var(--accent2);}
.proj-nav-dir{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);}
.proj-nav-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--text);}

footer{background:var(--text);color:var(--text3);padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;}
.footer-l{font-size:.65rem;letter-spacing:.1em;}
.footer-l span{color:var(--accent);}
.footer-r{display:flex;gap:2rem;}
.footer-r a{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);text-decoration:none;transition:color .2s;}
.footer-r a:hover{color:var(--accent);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{opacity:0;animation:fadeUp .6s ease forwards;}
.fade-in.d1{animation-delay:.15s;}
.fade-in.d2{animation-delay:.3s;}
.fade-in.d3{animation-delay:.45s;}
.fade-in.d4{animation-delay:.6s;}

/* responsive handled above */
</style>
</head>
<body>

<div id="cur"></div>
<div id="curR"></div>
<div id="prog"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightbox-img" src="" alt=""/>
  <button id="lightbox-close" aria-label="Close">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <div id="lightbox-caption"></div>
</div>

<nav>
  <a href="#hero" class="nav-logo">

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="projects-data.js"></script>
<script>
/* ════════════════════════════════════════
   PAGE RENDER — data loaded from projects-data.js
════════════════════════════════════════ */

/* ════════════════════════════════════════
   PAGE RENDER
════════════════════════════════════════ */
const params = new URLSearchParams(window.location.search);
const projectId = params.get('id') || '01';
const proj = PROJECTS.find(p => p.id === projectId) || PROJECTS[0];
const projIndex = PROJECTS.findIndex(p => p.id === projectId);

// Page title
document.title = `${proj.name} — Dipesh Patel`;

// Nav + crumb
document.getElementById('navTitle').textContent = proj.name;
document.getElementById('crumbTitle').textContent = proj.name;

// Hero
document.getElementById('heroTag').innerHTML = `<span style="width:5px;height:5px;background:var(--accent);border-radius:50%;display:inline-block"></span>${proj.catLabel || proj.cat}`;
document.getElementById('heroTitle').textContent = proj.name;
document.getElementById('heroDesc').textContent = proj.tagline;
document.getElementById('heroNum').textContent = proj.num;

const statusEl = document.getElementById('heroStatus');
statusEl.textContent = proj.statusLabel;
statusEl.className = `proj-status-badge ${proj.status}`;

// Meta row
document.getElementById('heroMeta').innerHTML = proj.meta.map(m=>
  `<div class="proj-meta-item">
    <div class="proj-meta-label">${m.label}</div>
    <div class="proj-meta-val${m.cls?' '+m.cls:''}">${m.val}</div>
  </div>`
).join('');

// Links
const linksHtml = proj.link && proj.link !== '#'
  ? `<a href="${proj.link}" target="_blank" rel="noopener" class="proj-link-btn primary">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 00-1.3-3.2 4.2 4.2 0 00-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 00-6.2 0C6.5 1.8 5.4 2.1 5.4 2.1a4.2 4.2 0 00-.1 3.2A4.6 4.6 0 004 8.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/></svg>
      View on GitHub
    </a>`
  : `<a href="#" class="proj-link-btn" style="opacity:.4;pointer-events:none;">Private Project</a>`;
document.getElementById('heroLinks').innerHTML = linksHtml;

// Tech pills
document.getElementById('techPills').innerHTML = proj.tech.map(t=>
  `<span class="tech-pill">${t}</span>`
).join('');

// Overview
document.getElementById('overviewText').innerHTML = proj.overview.map(p=>
  `<p>${p}</p>`
).join('');

// Steps — screenshots defined in projects-data.js per step (read-only, no upload)
function stepScHTML(stepIdx){
  const src = proj.screenshots && proj.screenshots[stepIdx];
  if(src){
    return `<div class="step-sc has-img" onclick="openLightbox('${src}','Step ${stepIdx+1}')">
      <img src="${src}" alt="Step ${stepIdx+1} screenshot"/>
      <div class="step-sc-zoom">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/></svg>
        Click to enlarge
      </div>
    </div>`;
  }
  return `<div class="step-sc">
    <div class="step-sc-inner">
      <div class="step-sc-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <div class="step-sc-label">No screenshot</div>
    </div>
  </div>`;
}

function renderSteps(){
  document.getElementById('stepsList').innerHTML = proj.steps.map((s,i)=>`
    <div class="step-item">
      <div class="step-item-inner">
        <div class="step-num">${String(i+1).padStart(2,'0')}</div>
        <div>
          <div class="step-title">${s.title}</div>
          <div class="step-desc">${s.desc}</div>
          ${s.code ? `<pre class="step-code">${s.code}</pre>` : ''}
        </div>
        ${stepScHTML(i)}
      </div>
    </div>
  `).join('');
}
renderSteps();

// Related projects (same cat, exclude self, up to 4)
const related = PROJECTS.filter(p => p.cat === proj.cat && p.id !== proj.id).slice(0, 4);
if(related.length){
  document.getElementById('relatedList').innerHTML = related.map(r=>
    `<div class="related-item" onclick="location.href='project.html?id=${r.id}'" style="cursor:pointer;">
      <div class="related-icon-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">${r.icon}</svg>
      </div>
      <div>
        <div class="related-name">${r.name}</div>
        <div class="related-cat">${r.statusLabel} · ${r.catLabel || r.cat}</div>
      </div>
    </div>`
  ).join('');
} else {
  document.getElementById('relatedList').innerHTML = '<div style="font-size:.72rem;color:var(--text3);padding:.75rem 0;">No related projects in this category.</div>';
}

// Prev / Next
const prev = PROJECTS[projIndex - 1];
const next = PROJECTS[projIndex + 1];
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
if(prev){ prevBtn.href=`project.html?id=${prev.id}`; document.getElementById('prevName').textContent=prev.name; }
else { prevBtn.style.opacity='.3'; prevBtn.style.pointerEvents='none'; }
if(next){ nextBtn.href=`project.html?id=${next.id}`; document.getElementById('nextName').textContent=next.name; }
else { nextBtn.style.opacity='.3'; nextBtn.style.pointerEvents='none'; }

/* ── CURSOR ── */
const cur=document.getElementById('cur'),curR=document.getElementById('curR');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
(function anim(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  curR.style.left=rx+'px'; curR.style.top=ry+'px';
  requestAnimationFrame(anim);
})();
document.querySelectorAll('a,button,.tech-pill,.proj-link-btn,.related-item,.proj-nav-btn,.step-item,.carr-btn').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.classList.add('h');curR.classList.add('h');});
  el.addEventListener('mouseleave',()=>{cur.classList.remove('h');curR.classList.remove('h');});
});

/* ── SCROLL PROGRESS ── */
window.addEventListener('scroll',()=>{
  document.getElementById('prog').style.width=(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%';
});

/* ── SCROLL REVEAL ── */
(function(){
  const style = document.createElement('style');
  style.textContent = `
    .fade-in { opacity: 0; transform: translateY(20px); }
    .fade-in.visible { opacity: 1; transform: translateY(0); transition: opacity .6s ease, transform .6s ease; }
    .fade-in.d1.visible { transition-delay: .15s; }
    .fade-in.d2.visible { transition-delay: .3s; }
    .fade-in.d3.visible { transition-delay: .45s; }
    .fade-in.d4.visible { transition-delay: .6s; }
  `;
  document.head.appendChild(style);
  const io = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){ en.target.classList.add('visible'); io.unobserve(en.target); }
    });
  },{threshold:0.08});
  document.querySelectorAll('.fade-in').forEach(el=>io.observe(el));
})();
/* ── LIGHTBOX ── */
const lb       = document.getElementById('lightbox');
const lbImg    = document.getElementById('lightbox-img');
const lbClose  = document.getElementById('lightbox-close');
const lbCaption= document.getElementById('lightbox-caption');

function openLightbox(src, caption){
  lbImg.src = src;
  lbCaption.textContent = caption || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  lb.classList.remove('open');
  document.body.style.overflow = '';
  // clear src after transition so no flash on reopen
  setTimeout(()=>{ if(!lb.classList.contains('open')) lbImg.src=''; }, 280);
}

lbClose.addEventListener('click', closeLightbox);
// click backdrop (not the image) to close
lb.addEventListener('click', e=>{ if(e.target === lb) closeLightbox(); });
// Escape key to close
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

</script>
